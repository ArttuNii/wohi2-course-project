services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: wohiisecret
      MYSQL_DATABASE: mydb
      MYSQL_USER: wohii
      MYSQL_PASSWORD: Eevertti123
    ports:
      - "3300:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pwohiisecret"]
      interval: 5s
      timeout: 3s
      retries: 10
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
volumes:
  dbdata:
  uploads: